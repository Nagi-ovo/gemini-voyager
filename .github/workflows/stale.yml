name: 'Close Stale Issues'
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale after 30 days without activity. It will be closed in another 30 days if no further activity occurs. If you claimed it, post a progress update or use /unclaim so another contributor can help. Thank you for your contributions.'
          days-before-issue-stale: 30
          days-before-issue-close: 30
          days-before-pr-stale: -1
          days-before-pr-close: -1
          exempt-issue-labels: 'important'
          stale-issue-label: 'stale'
          close-issue-reason: 'not_planned'
