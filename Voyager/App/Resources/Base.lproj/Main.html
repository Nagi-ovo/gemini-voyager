<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">

    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

    <link rel="stylesheet" href="../Style.css">
    <script src="../Script.js" defer></script>
</head>
<body>
    <main class="app-shell">
        <header class="hero">
            <img class="app-icon" src="../Icon.png" width="76" height="76" alt="Voyager Icon">
            <h1>Voyager</h1>
            <p class="state-unknown">Turn on Voyager in Safari Extensions to get started.</p>
            <p class="state-on">The Safari extension is on and ready.</p>
            <p class="state-off">The Safari extension is off. Turn it on in Safari Extensions.</p>
            <button class="open-preferences">Open Safari Extensions…</button>
        </header>

        <section class="updates" aria-labelledby="updates-title">
            <h2 id="updates-title">Updates</h2>
            <label class="automatic-updates">
                <span class="update-copy">
                    <strong>Automatic updates</strong>
                    <small>Keep Voyager up to date in the background.</small>
                </span>
                <input type="checkbox" aria-label="Automatic updates">
                <span class="switch" aria-hidden="true"></span>
            </label>
            <button class="check-for-updates">Check for updates</button>
        </section>

        <section class="diagnostics" aria-labelledby="diagnostics-title">
            <div class="section-heading">
                <div>
                    <h2 id="diagnostics-title">System status</h2>
                    <p>Safari and native integrations</p>
                </div>
                <button class="refresh-diagnostics" aria-label="Refresh system status">Refresh</button>
            </div>
            <div class="diagnostics-list" aria-live="polite">
                <p class="diagnostics-loading">Checking…</p>
            </div>
        </section>
    </main>
</body>
</html>
